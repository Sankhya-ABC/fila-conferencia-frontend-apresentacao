<form class="login-page" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="login-form">
    <div class="form-wrapper">
      <h1>Login</h1>
      <p class="subtitle">Acesso à fila de conferência</p>

      <mat-form-field appearance="outline">
        <mat-label>Usuário</mat-label>
        <input matInput formControlName="username" />
        <mat-error *ngIf="form.controls.username.invalid">
          Usuário obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.controls.password.invalid">
          Senha obrigatória
        </mat-error>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || loading"
      >
        {{ loading ? "Entrando..." : "Entrar" }}
      </button>
    </div>
  </div>

  <div class="login-image">
    <div class="overlay">
      <h2>Fila de Conferência</h2>
      <p>Agilidade, controle e precisão na expedição</p>
    </div>
  </div>
</form>
