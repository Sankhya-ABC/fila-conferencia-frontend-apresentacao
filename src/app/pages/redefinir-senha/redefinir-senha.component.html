<form class="login-page" [formGroup]="form" (ngSubmit)="redefinirSenha()">
  <div class="login-form">
    <div class="form-wrapper">
      <h1>Redefinir Senha</h1>
      <p class="subtitle">Insira a nova senha.</p>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="senha" />
        <mat-error *ngIf="form.controls.senha.invalid">
          Campo obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirmar Senha</mat-label>
        <input matInput formControlName="confirmarSenha" />
        <mat-error *ngIf="form.controls.confirmarSenha.invalid">
          Campo obrigatório
        </mat-error>
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || loading"
      >
        {{ loading ? "Alterando..." : "Alterar" }}
      </button>
    </div>
  </div>
</form>
