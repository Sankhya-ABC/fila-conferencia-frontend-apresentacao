<div class="dialog-container" [ngClass]="data.tipo || 'info'">
  <mat-icon class="icon">
    {{
      data.tipo === "erro"
        ? "error"
        : data.tipo === "aviso"
          ? "warning"
          : "info"
    }}
  </mat-icon>

  <h2>{{ data.titulo }}</h2>
  <p>{{ data.mensagem }}</p>
</div>
